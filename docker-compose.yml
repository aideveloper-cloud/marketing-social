version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketing_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketing}
      POSTGRES_USER: ${POSTGRES_USER:-marketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketing_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./etl/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketing}"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: marketing_metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB:-marketing}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-marketing}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-marketing_pass}
      MB_DB_HOST: postgres
      MB_SITE_NAME: "Marketing Analytics"
      JAVA_TIMEZONE: Asia/Bangkok
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: marketing_etl
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-marketing}:${POSTGRES_PASSWORD:-marketing_pass}@postgres:5432/${POSTGRES_DB:-marketing}
      # Shopee
      SHOPEE_PARTNER_ID: ${SHOPEE_PARTNER_ID}
      SHOPEE_PARTNER_KEY: ${SHOPEE_PARTNER_KEY}
      SHOPEE_SHOP_ID: ${SHOPEE_SHOP_ID}
      SHOPEE_ACCESS_TOKEN: ${SHOPEE_ACCESS_TOKEN}
      # Lazada
      LAZADA_APP_KEY: ${LAZADA_APP_KEY}
      LAZADA_APP_SECRET: ${LAZADA_APP_SECRET}
      LAZADA_ACCESS_TOKEN: ${LAZADA_ACCESS_TOKEN}
      LAZADA_COUNTRY: ${LAZADA_COUNTRY:-TH}
      # TikTok Shop
      TIKTOK_APP_KEY: ${TIKTOK_APP_KEY}
      TIKTOK_APP_SECRET: ${TIKTOK_APP_SECRET}
      TIKTOK_SHOP_ID: ${TIKTOK_SHOP_ID}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN}
      # Schedule (cron expressions)
      SYNC_ORDERS_CRON: ${SYNC_ORDERS_CRON:-0 * * * *}
      SYNC_PRODUCTS_CRON: ${SYNC_PRODUCTS_CRON:-0 */4 * * *}
      SYNC_ADS_CRON: ${SYNC_ADS_CRON:-30 * * * *}
    volumes:
      - etl_logs:/app/logs

volumes:
  postgres_data:
  metabase_data:
  etl_logs:
